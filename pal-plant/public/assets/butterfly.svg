<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wingL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="wingR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <!-- Left upper wing -->
  <ellipse cx="14" cy="16" rx="12" ry="10" fill="url(#wingL)" opacity="0.9"/>
  <ellipse cx="14" cy="16" rx="6" ry="5" fill="#e9d5ff" opacity="0.5"/>
  <!-- Right upper wing -->
  <ellipse cx="34" cy="16" rx="12" ry="10" fill="url(#wingR)" opacity="0.9"/>
  <ellipse cx="34" cy="16" rx="6" ry="5" fill="#fce7f3" opacity="0.5"/>
  <!-- Left lower wing -->
  <ellipse cx="16" cy="30" rx="9" ry="7" fill="url(#wingL)" opacity="0.75"/>
  <ellipse cx="16" cy="30" rx="4" ry="3" fill="#e9d5ff" opacity="0.4"/>
  <!-- Right lower wing -->
  <ellipse cx="32" cy="30" rx="9" ry="7" fill="url(#wingR)" opacity="0.75"/>
  <ellipse cx="32" cy="30" rx="4" ry="3" fill="#fce7f3" opacity="0.4"/>
  <!-- Body -->
  <ellipse cx="24" cy="24" rx="3" ry="14" fill="#5b21b6"/>
  <!-- Head -->
  <circle cx="24" cy="9" r="3.5" fill="#6d28d9"/>
  <!-- Antennae -->
  <path d="M22 8C18 2 14 2 12 4" stroke="#6d28d9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M26 8C30 2 34 2 36 4" stroke="#6d28d9" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <circle cx="12" cy="4" r="1.5" fill="#a855f7"/>
  <circle cx="36" cy="4" r="1.5" fill="#ec4899"/>
  <!-- Eyes -->
  <circle cx="22.5" cy="8.5" r="1" fill="white"/>
  <circle cx="25.5" cy="8.5" r="1" fill="white"/>
</svg>
