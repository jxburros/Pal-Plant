<svg width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="potRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="leafL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="leafR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="potShine">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="potShadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="flowerCenter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Ground shadow -->
  <ellipse cx="130" cy="237" rx="78" ry="14" fill="#0f172a" fill-opacity="0.12"/>
  <!-- Pot body -->
  <path d="M72 154H188L174 228H86L72 154Z" fill="url(#pot)" filter="url(#potShadow)"/>
  <!-- Pot shine -->
  <ellipse cx="110" cy="182" rx="30" ry="40" fill="url(#potShine)"/>
  <!-- Pot rim -->
  <rect x="64" y="140" width="132" height="22" rx="11" fill="url(#potRim)"/>
  <!-- Pot rim highlight -->
  <rect x="70" y="142" width="80" height="6" rx="3" fill="white" opacity="0.2"/>
  <!-- Soil visible at top -->
  <ellipse cx="130" cy="156" rx="48" ry="6" fill="#92400e" opacity="0.3"/>
  <!-- Left stem -->
  <path d="M126 140C128 124 124 106 116 86" stroke="url(#stem)" stroke-width="9" stroke-linecap="round"/>
  <!-- Right stem -->
  <path d="M134 140C134 118 140 102 152 86" stroke="url(#stem)" stroke-width="9" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M118 86C86 90 68 68 70 38C100 38 122 56 118 86Z" fill="url(#leafL)"/>
  <!-- Left leaf vein -->
  <path d="M118 86C106 72 92 58 76 44" stroke="#16a34a" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M104 72C96 64 88 58 80 52" stroke="#16a34a" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Left leaf highlight -->
  <path d="M110 82C90 84 78 70 80 50" stroke="#86efac" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Right leaf -->
  <path d="M152 86C184 90 204 68 200 38C172 38 148 56 152 86Z" fill="url(#leafR)"/>
  <!-- Right leaf vein -->
  <path d="M152 86C164 72 178 58 192 44" stroke="#15803d" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M166 72C174 64 182 58 190 52" stroke="#15803d" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Tiny flower on left leaf -->
  <g transform="translate(88, 52) rotate(-15)">
    <circle cx="0" cy="-6" r="4" fill="#fda4af"/>
    <circle cx="5" cy="-2" r="4" fill="#fda4af"/>
    <circle cx="3" cy="4" r="4" fill="#fda4af"/>
    <circle cx="-3" cy="4" r="4" fill="#fda4af"/>
    <circle cx="-5" cy="-2" r="4" fill="#fda4af"/>
    <circle cx="0" cy="0" r="3" fill="url(#flowerCenter)"/>
  </g>
  <!-- Face - eyes -->
  <circle cx="117" cy="178" r="5.5" fill="#1e293b"/>
  <circle cx="143" cy="178" r="5.5" fill="#1e293b"/>
  <!-- Eye highlights -->
  <circle cx="115" cy="176" r="2" fill="white"/>
  <circle cx="141" cy="176" r="2" fill="white"/>
  <circle cx="119" cy="180" r="1" fill="white" opacity="0.5"/>
  <circle cx="145" cy="180" r="1" fill="white" opacity="0.5"/>
  <!-- Rosy cheeks -->
  <ellipse cx="106" cy="188" rx="8" ry="5" fill="#fda4af" opacity="0.35"/>
  <ellipse cx="154" cy="188" rx="8" ry="5" fill="#fda4af" opacity="0.35"/>
  <!-- Smile -->
  <path d="M116 196C124 204 136 204 144 196" stroke="#1e293b" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
